{% extends "base.html" %}

{% block content %}
<div class="container mt-5 mb-5">
    <h2>Блог</h2>
    {% if posts %}
    <div class="row">
        {% for post in posts %}
        <div class="col-lg-4 mb-4">
            <div class="card h-100">
                {% if post.img %}
                <img class="card-img-top" src="{{ post.img.url }}" alt="{{ post.title }}">
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">{{ post.title }}</h5>
                    <p class="card-text">{{ post.created_at|date:"d.m.Y" }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p>Постов пока нет.</p>
    {% endif %}
</div>
{% endblock content %}
