<!--brand area start-->
    <div class="brand_area">
        <div class="container">
            <div class="col-12">
                <div class="brand_container owl-carousel ">
                {% for part in partners %}
                    <div class="brand_list">
                        <div class="single_brand">
                            {% if part.logo %}
                                <a href="{{ part.link }}"><img src="{{ part.logo.url }}" alt=""></a>
                            {% endif %}
                        </div>
                    </div>
                {% endfor %}
                </div>
            </div>
        </div>
    </div>
    <!--brand area end-->
